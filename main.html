<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <header class="flex justify-between w-[95%] mx-auto">
        <!-- navbar -->
        <nav class="navbar bg-base-100 shadow-sm flex justify-between">
            <div class="flex  gap-3">

                <img src="./assets/github-logo.png" class="w-7 h-7" alt="">

                <h1 class=" sm:text-2xl font-bold mb-2">GitHub Issues Tracker</h1>

            </div>
            <div class="flex gap-2">
                <input type="text"  placeholder="Search issu..." class="input input-bordered w-24 md:w-auto" />
                
                <div class="dropdown dropdown-end">
                    <div>
                        <div class="">
                            <button class="btn btn-primary">
                                <i class="fa-solid fa-plus"></i> Primary</button>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
