<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GitHub Issues Tracker</title>

    <link rel="shortcut icon" href="./assets/github-logo.png">

    <link rel="stylesheet" href="style.css">

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

</head>

<body class="bg-gray-100 font-geist">

    <!-- NAVBAR -->

    <header class="bg-white shadow">
        <nav class="flex justify-between items-center w-11/12 mx-auto py-4">

            <div class="flex items-center gap-3">

                <img src="./assets/github-logo.png" class="w-8">

                <h1 class="text-2xl font-bold">
                    GitHub Issues Tracker
                </h1>

            </div>

            <div class="flex gap-3">

                <input id="searchInput" onkeyup="searchIssue()" type="text" placeholder="Search issues..."
                    class="input input-bordered w-40 md:w-64" />

                <button class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i>
                    Add Issue
                </button>

            </div>

        </nav>
    </header>


    <!-- MAIN -->

    <main class="w-11/12 mx-auto my-10">

        <!-- TAB SECTION -->

        <section>

            <div class="bg-white p-4 rounded flex gap-3">

                <button id="allTab" onclick="setTab('all')" class="tabBtn bg-purple-600 text-white px-4 py-2 rounded">
                    All
                </button>

                <button id="openTab" onclick="setTab('open')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
                    Open
                </button>

                <button id="closedTab" onclick="setTab('closed')" class="tabBtn bg-gray-200 px-4 py-2 rounded">
                    Closed
                </button>

            </div>


            <!-- ISSUE COUNT -->

            <div class="flex justify-between items-center bg-white p-4 rounded my-6">

                <div class="flex items-center gap-3">

                    <img src="./assets/Aperture.png" class="w-10">

                    <div>

                        <h2 id="issueCount" class="text-2xl font-bold">
                            0 Issues
                        </h2>

                        <p class="text-gray-500">
                            Track and manage your project issues
                        </p>

                    </div>

                </div>

                <div class="flex gap-4">

                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                        <p>Open</p>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 bg-purple-500 rounded-full"></div>
                        <p>Closed</p>
                    </div>

                </div>

            </div>

        </section>


        <!-- LOADER -->

        <div id="loader" class="text-center py-10 hidden">

            <span class="loading loading-spinner loading-lg text-purple-600"></span>

        </div>


        <!-- ISSUE CARDS -->

        <section id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
        </section>


        <!-- MODAL -->

        <div id="modal" class="fixed inset-0 bg-black bg-opacity-40 hidden items-center justify-center">

            <div class="bg-white p-6 rounded w-96">

                <h2 id="mTitle" class="text-xl font-bold"></h2>

                <p id="mDesc" class="mt-3 text-gray-600"></p>

                <div class="mt-4 text-sm space-y-1">

                    <p id="mStatus"></p>
                    <p id="mAuthor"></p>
                    <p id="mPriority"></p>
                    <p id="mLabel"></p>
                    <p id="mDate"></p>

                </div>

                <button onclick="closeModal()" class="btn btn-primary mt-4 w-full">
                    Close
                </button>

            </div>

        </div>

    </main>

<div>
    || "No Label"
</div>

    <script src="./script/script.js"></script>

</body>

</html>
