<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <!-- tailwind + daisy -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-3xl shadow w-96 text-center">
        <div class="flex flex-col items-center ">
            <img src="./assets/github-logo.png" class="w-24 h-24" alt="">
            <h1 class="text-2xl font-bold mb-2">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mb-6">Sign in to manage your issues</p>
        </div>

        <input id="username" class="border w-full p-2 mb-3 rounded" placeholder="Username">

        <input id="password" type="" class="border w-full p-2 mb-3 rounded" placeholder="Password">

        <button onclick="login()" class="bg-purple-600 text-white w-full p-2 rounded">
            Sign In
        </button>

        <p class="text-sm text-gray-500 mt-4">

            Username: admin <br>
            Password: admin123
        </p>

    </div>
    <!-- javascript -->
     <script src="./script/login.js"></script>
</body>

</html>
